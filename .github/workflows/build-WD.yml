name: Build WD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: windows-2025-vs2026

    steps:
    - uses: actions/checkout@v4
    - name: Install VCPkg Packages
      run: vcpkg install
    - name: Configure CMake
      run: |
          mkdir build
          cd build
          cmake ..
          cd ../
    - name: Build WinDurango
      run: cmake --build .
