name: Build WD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: windows-2025-vs2026

    steps:
    - uses: actions/checkout@v4
    - uses: ilammy/msvc-dev-cmd@v1
    - name: Install VCPkg Packages
      uses: lukka/run-vcpkg@v11
    - name: Install Kinect SDK
      run: |
        Invoke-WebRequest -Uri "https://download.microsoft.com/download/f/2/d/f2d1012e-3bc6-49c5-b8b3-5acff58af7b8/KinectSDK-v2.0_1409-Setup.exe" -OutFile "KinectSDK.exe"
        Start-Process -FilePath ".\KinectSDK.exe" -ArgumentList "/quiet /norestart" -Wait
    - name: Configure CMake
      run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake
          cd ../
    - name: Build WinDurango
      run: cmake --build build --config Release
    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: WinDurango-Release
        path: build/bin/Release/
        archive: true
